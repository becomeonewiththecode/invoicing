# Standalone production: put this file and your `.env` in the SAME directory on the server
# (e.g. ~/invoice or /home/app_user/invoice). Always `cd` there before `docker compose`.
# Compose loads `.env` from that directory and resolves `./data` relative to it.
# https://docs.docker.com/compose/how-tos/environment-variables/variable-interpolation/
#
# TLS: BIND MOUNTS under DEPLOY_DATA_DIR (default ./data) next to this file. Before first `up`:
#   cd /path/to/that/directory
#   mkdir -p data/acme_webroot data/ssl_certs && chown -R "$(id -u):$(id -g)" data
# (If Docker created data/ as root, `sudo chown` to your deploy user.)
services:
  postgres:
    image: maxwayne/invoice-postgres:1.0
    environment:
      POSTGRES_DB: invoicing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d invoicing"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 5s

  backend:
    image: maxwayne/invoice-backend:1.0
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/invoicing
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@invoicing.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-4BS2GRnF4mbUsEIg8oI6}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3001/api/health',(r)=>{r.resume();r.on('end',()=>process.exit(r.statusCode===200?0:1));}).on('error',()=>process.exit(1));",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  frontend:
    image: maxwayne/invoice-frontend:1.0
    ports:
      - "80:80"
      - "443:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-clients.opensitesolutions.com}
    volumes:
      - ${DEPLOY_DATA_DIR:-./data}/acme_webroot:/var/www/acme-webroot
      - ${DEPLOY_DATA_DIR:-./data}/ssl_certs:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  uploads_data:
